name: Agent Regression Tests

on:
  push:
    branches: [main]
    paths:
      - 'packages/agent/**'
      - 'packages/queue/**'
      - 'apps/api/src/agent-loop.ts'
      - 'apps/api/src/parallel-executor.ts'
  pull_request:
    paths:
      - 'packages/agent/**'
      - 'packages/queue/**'
      - 'apps/api/src/agent-loop.ts'
      - 'apps/api/src/parallel-executor.ts'

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run agent regression tests
        run: pnpm --filter @plexo/agent test
