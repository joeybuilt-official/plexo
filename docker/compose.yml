services:
  # ── Database ──────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: plexo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: plexo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U plexo -d plexo" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Cache / State ────────────────────────────────────────

  redis:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: valkey-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.5"

  # ── DB Migrations (runs once, exits) ────────────────────

  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    entrypoint: [ "/bin/sh", "/migrate.sh" ]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://plexo:${POSTGRES_PASSWORD}@postgres:5432/plexo
      MIGRATIONS_DIR: ./drizzle
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ── API Server ───────────────────────────────────────────

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://plexo:${POSTGRES_PASSWORD}@postgres:5432/plexo
      REDIS_URL: redis://redis:6379
      PUBLIC_URL: ${PUBLIC_URL}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      SESSION_SECRET: ${SESSION_SECRET}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID:-}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DISCORD_APP_ID: ${DISCORD_APP_ID:-}
      DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      MAX_SPRINT_WORKERS: ${MAX_SPRINT_WORKERS:-5}
      API_COST_CEILING_USD: ${API_COST_CEILING_USD:-10.00}
      APP_VERSION: ${APP_VERSION:-dev}
      # Asset storage (MinIO or S3-compatible)
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://minio:9000}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-plexo-assets}
      # One-click update: set to "true" and uncomment the volumes block below.
      # Requires the Docker socket to be mounted. See the comment near 'volumes:' below.
      DOCKER_SOCKET_ENABLED: ${DOCKER_SOCKET_ENABLED:-false}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-plexo}
    # ── One-click update (opt-in) ──────────────────────────────────────────
    # To enable the in-app update button, set DOCKER_SOCKET_ENABLED=true in
    # your .env and uncomment the block below. Mounting the Docker socket
    # grants the API container root-equivalent access to the host — only do
    # this if you understand the security tradeoff.
    #
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health 2>/dev/null | grep -q ok || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Web Dashboard ────────────────────────────────────────

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      AUTH_URL: ${PUBLIC_URL}
      AUTH_SECRET: ${SESSION_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      NEXT_PUBLIC_API_URL: ${PUBLIC_URL}/api
      INTERNAL_API_URL: http://api:3001
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3000 2>/dev/null | grep -q html || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Asset Storage (S3-compatible) ──────────────────────────
  # MinIO provides local S3-compatible storage for agent-produced assets.
  # Operators can swap this for real S3/Cloudflare R2/Backblaze B2 by
  # changing STORAGE_ENDPOINT, STORAGE_ACCESS_KEY, STORAGE_SECRET_KEY in .env.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"] 
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ── Reverse Proxy ────────────────────────────────────────

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

volumes:
  pgdata:
  redisdata:
  miniodata:
  caddy_data:
  caddy_config:
