services:
  # ── Database ──────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    # Unique hostname avoids DNS collision when deployed via Coolify, which
    # connects the api container to the Coolify network where 'postgres'
    # already resolves to coolify-db. 'plexo-db' is scoped to this network only.
    hostname: plexo-db
    environment:
      POSTGRES_USER: plexo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plexo}
      POSTGRES_DB: plexo
    volumes:
      - pgdata:/var/lib/postgresql/data
    # healthcheck removed temporarily to diagnose startup
    # Enforced cgroup limits (mem_limit/memswap_limit apply without Swarm mode)
    mem_limit: 512m
    memswap_limit: 1g

  # ── Cache / State ────────────────────────────────────────

  redis:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: valkey-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 192m
    memswap_limit: 256m

  # ── DB Migrations (runs once, exits) ────────────────────

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        SOURCE_COMMIT: ${SOURCE_COMMIT:-unknown}
    entrypoint: [ "/bin/sh", "/migrate.sh" ]
    restart: "no"
    depends_on:
      postgres:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://plexo:${POSTGRES_PASSWORD}@plexo-db:5432/plexo
      MIGRATIONS_DIR: /app/packages/db/drizzle
    # 256m RAM + up to 256m swap = 512m ceiling total.
    # OOM-kill enforced by cgroup — prevents runaway swap consumption.
    mem_limit: 256m
    memswap_limit: 512m

  # ── API Server ───────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        APP_VERSION: ${APP_VERSION:-auto}
        SOURCE_COMMIT: ${SOURCE_COMMIT:-unknown}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://plexo:${POSTGRES_PASSWORD}@plexo-db:5432/plexo
      REDIS_URL: redis://redis:6379
      PUBLIC_URL: ${PUBLIC_URL}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      SESSION_SECRET: ${SESSION_SECRET}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Supabase Auth (shared joeybuilt-platform instance)
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      PLEXO_SERVICE_KEY: ${PLEXO_SERVICE_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID:-}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DISCORD_APP_ID: ${DISCORD_APP_ID:-}
      DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      MAX_SPRINT_WORKERS: ${MAX_SPRINT_WORKERS:-5}
      API_COST_CEILING_USD: ${API_COST_CEILING_USD:-10.00}
      APP_VERSION: ${APP_VERSION:-auto}
      # Asset storage (MinIO or S3-compatible)
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://minio:9000}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-plexo-assets}
      # One-click update: set to "true" and uncomment the volumes block below.
      # Requires the Docker socket to be mounted. See the comment near 'volumes:' below.
      DOCKER_SOCKET_ENABLED: ${DOCKER_SOCKET_ENABLED:-true}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-plexo}
    # ── One-click update (opt-in) ──────────────────────────────────────────
    # Mounting the Docker socket grants the API container root-equivalent
    # access to the host. DOCKER_SOCKET_ENABLED=true must also be set in .env.
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - generated_skills:/var/plexo/generated-skills
    # When Coolify connects this container to its proxy network, 'postgres'
    # may resolve to coolify-db instead of our database. Use the unique
    # hostname 'plexo-db' (set on the postgres service) to avoid collisions.
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health 2>/dev/null | grep -q ok || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    mem_limit: 512m
    memswap_limit: 768m

  # ── Web Dashboard ────────────────────────────────────────

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        SOURCE_COMMIT: ${SOURCE_COMMIT:-unknown}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Supabase Auth (shared joeybuilt-platform instance)
      NEXT_PUBLIC_SUPABASE_AUTH_URL: ${NEXT_PUBLIC_SUPABASE_AUTH_URL:-${SUPABASE_URL:-}}
      NEXT_PUBLIC_SUPABASE_AUTH_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_AUTH_ANON_KEY:-}
      NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN:-}
      NEXT_PUBLIC_API_URL: ${PUBLIC_URL}/api
      INTERNAL_API_URL: http://api:3001
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3000 2>/dev/null | grep -q html || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    mem_limit: 512m
    memswap_limit: 768m

  # ── Asset Storage (S3-compatible) ──────────────────────────
  # MinIO provides local S3-compatible storage for agent-produced assets.
  # Operators can swap this for real S3/Cloudflare R2/Backblaze B2 by
  # changing STORAGE_ENDPOINT, STORAGE_ACCESS_KEY, STORAGE_SECRET_KEY in .env.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"] 
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    memswap_limit: 384m

  # ── Reverse Proxy (self-hosted only) ─────────────────────
  # For managed deployments (Coolify), the platform proxy handles TLS.
  # To enable caddy for self-hosted, use: docker compose --profile selfhosted up
  caddy:
    profiles: ["selfhosted"]
    build:
      context: .
      dockerfile: docker/Dockerfile.caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    mem_limit: 128m
    memswap_limit: 192m

volumes:
  pgdata:
  redisdata:
  miniodata:
  caddy_data:
  caddy_config:
  generated_skills:
